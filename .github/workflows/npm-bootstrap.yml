name: Bootstrap npm Packages

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Existing GitHub Release tag to publish to npm
        required: true
        default: v0.1.0
        type: string

concurrency:
  group: npm-bootstrap
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish Initial npm Packages
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: npm
    steps:
      - name: Check out publishing tools
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Use the supported npm CLI
        run: npm install --global npm@12.0.1 --ignore-scripts

      - name: Download GitHub Release assets
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          mkdir -p dist/release
          gh release download "$RELEASE_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --dir dist/release

      - name: Test npm release tooling
        run: node --test npm/scripts/*.test.mjs

      - name: Build npm packages
        env:
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          node npm/scripts/build-packages.mjs \
            --version "$RELEASE_TAG" \
            --assets dist/release \
            --output dist/npm

      - name: Verify npm packages
        run: node npm/scripts/verify-packages.mjs --directory dist/npm

      - name: Publish initial packages with a temporary token
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_BOOTSTRAP_TOKEN }}
        run: node npm/scripts/publish-packages.mjs --directory dist/npm
